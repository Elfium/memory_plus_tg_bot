name: Daily English Word

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  send-word:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 👈 ЭТО РАЗРЕШАЕТ МЕНЯТЬ ФАЙЛЫ
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run bot
        run: python main.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
